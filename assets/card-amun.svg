<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 372 236" preserveAspectRatio="xMidYMid slice">
  <!-- Steel blue background -->
  <rect width="372" height="236" fill="#3F5A82"/>

  <!-- Hebrew text 'מערכת אמו"ן' -->
  <g font-family="Rubik, Arial, sans-serif" fill="#FFFFFF">
    <text x="186" y="128" text-anchor="middle" font-size="32" font-weight="700">מערכת אמו"ן</text>
  </g>

  <!-- Soaring bird with Star of David (on the left side of the centered text) -->
  <g transform="translate(282, 84)">
    <!-- Star of David (small, white) -->
    <g fill="#FFFFFF" transform="translate(20, 8)">
      <polygon points="14,0 17,7 24,7 18.5,12 21,20 14,15.5 7,20 9.5,12 4,7 11,7" stroke="#FFFFFF" stroke-width="0.5"/>
      <polygon points="14,28 17,21 24,21 18.5,16 21,8 14,12.5 7,8 9.5,16 4,21 11,21" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
    </g>

    <!-- Bird body (white wing) -->
    <g fill="#FFFFFF" transform="translate(0, 14)">
      <!-- Main wing curve -->
      <path d="M5 30 Q15 12 32 18 Q40 22 35 38 Q28 50 18 48 Q8 46 5 30 Z"/>
      <!-- Tail flair -->
      <path d="M28 38 Q42 32 48 42 Q44 50 36 48 Q30 46 28 38 Z"/>
    </g>

    <!-- Teal/green accent wing layer -->
    <g fill="#5BC9C0" opacity="0.95" transform="translate(0, 14)">
      <path d="M14 36 Q22 26 32 30 Q35 36 28 42 Q20 44 14 36 Z"/>
    </g>
  </g>
</svg>
