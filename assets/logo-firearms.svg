<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" fill="none">
  <!-- Firearms Licensing Division logo - trilingual -->
  <g font-family="Rubik, system-ui, sans-serif" fill="#0C3058">
    <text x="195" y="18" text-anchor="end" font-size="15" font-weight="800">האגף לרישוי כלי ירייה</text>
    <text x="195" y="34" text-anchor="end" font-size="11" font-weight="600">إدارة تراخيص الأسلحة النارية</text>
    <text x="195" y="52" text-anchor="end" font-size="12" font-weight="700">Firearms Licensing Division</text>
  </g>
  <!-- Target + shooter icon -->
  <g transform="translate(205, 8)">
    <!-- Outer target ring -->
    <circle cx="20" cy="24" r="22" fill="none" stroke="#0C3058" stroke-width="2.5"/>
    <!-- Inner concentric rings -->
    <circle cx="20" cy="24" r="16" fill="none" stroke="#0C3058" stroke-width="2"/>
    <circle cx="20" cy="24" r="10" fill="none" stroke="#0C3058" stroke-width="2"/>
    <!-- Crosshair -->
    <line x1="20" y1="0" x2="20" y2="48" stroke="#0C3058" stroke-width="1"/>
    <line x1="-2" y1="24" x2="42" y2="24" stroke="#0C3058" stroke-width="1"/>
    <!-- Bullseye -->
    <circle cx="20" cy="24" r="4" fill="#0C3058"/>
    <!-- Shooter silhouette overlay (small) -->
    <g transform="translate(8, 4)" fill="#0C3058" opacity="0.85">
      <circle cx="4" cy="5" r="3"/>
      <path d="M0 16 L8 16 L10 28 L8 32 L6 32 L4 20 L2 32 L0 32 L-2 28 Z"/>
      <path d="M4 12 L14 16 L20 14 L22 18 L14 20 L4 16 Z"/>
    </g>
  </g>
</svg>
