<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 372 236" preserveAspectRatio="xMidYMid slice" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Dark navy background -->
  <rect width="372" height="236" fill="#1F3149"/>

  <!-- GuideStar wordmark + icon -->
  <g font-family="Rubik, Arial, sans-serif" fill="#D6DBE2">
    <text x="186" y="128" text-anchor="middle" font-size="34" font-weight="700" letter-spacing="1">גיידסטאר</text>
  </g>

  <!-- Star of connected people icon (right side of text in RTL) -->
  <g transform="translate(102, 90) scale(0.62)" fill="none" stroke="#D6DBE2" stroke-width="2.5">
    <!-- Center circle -->
    <circle cx="40" cy="40" r="7" fill="#D6DBE2"/>
    <!-- 8 people around -->
    <g stroke-linecap="round" stroke-linejoin="round">
      <!-- Top -->
      <circle cx="40" cy="6" r="4.5"/>
      <path d="M33 16 Q40 13 47 16"/>
      <!-- Top-right -->
      <circle cx="64" cy="16" r="4.5"/>
      <path d="M59 24 Q64 22 70 24"/>
      <!-- Right -->
      <circle cx="74" cy="40" r="4.5"/>
      <path d="M68 47 Q74 45 80 47"/>
      <!-- Bottom-right -->
      <circle cx="64" cy="64" r="4.5"/>
      <path d="M58 72 Q64 70 70 72"/>
      <!-- Bottom -->
      <circle cx="40" cy="74" r="4.5"/>
      <path d="M33 82 Q40 80 47 82"/>
      <!-- Bottom-left -->
      <circle cx="16" cy="64" r="4.5"/>
      <path d="M10 72 Q16 70 22 72"/>
      <!-- Left -->
      <circle cx="6" cy="40" r="4.5"/>
      <path d="M0 47 Q6 45 12 47"/>
      <!-- Top-left -->
      <circle cx="16" cy="16" r="4.5"/>
      <path d="M10 24 Q16 22 22 24"/>
    </g>
    <!-- Connecting lines (star pattern) -->
    <g stroke-width="1.5" opacity="0.9">
      <line x1="40" y1="10" x2="40" y2="33"/>
      <line x1="64" y1="20" x2="46" y2="35"/>
      <line x1="70" y1="40" x2="47" y2="40"/>
      <line x1="64" y1="60" x2="46" y2="45"/>
      <line x1="40" y1="70" x2="40" y2="47"/>
      <line x1="16" y1="60" x2="34" y2="45"/>
      <line x1="10" y1="40" x2="33" y2="40"/>
      <line x1="16" y1="20" x2="34" y2="35"/>
    </g>
  </g>
</svg>
