<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 372 236" preserveAspectRatio="xMidYMid slice">
  <!-- Bright royal blue background -->
  <rect width="372" height="236" fill="#1F4FE5"/>

  <!-- Hebrew text "מנוע הזכויות" -->
  <g font-family="Rubik, Arial, sans-serif" fill="#FFFFFF">
    <text x="180" y="128" text-anchor="middle" font-size="32" font-weight="800">מנוע הזכויות</text>
  </g>

  <!-- State of Israel emblem (shield with menorah) on the left side -->
  <g transform="translate(280, 86)">
    <!-- White rounded shield -->
    <path d="M30 0 L60 6 V42 C60 56 47 64 30 64 C13 64 0 56 0 42 V6 Z" fill="#FFFFFF"/>
    <!-- Menorah inside shield (navy blue) -->
    <g fill="#1F4FE5" transform="translate(30, 36)">
      <!-- Base -->
      <rect x="-1.5" y="14" width="3" height="3"/>
      <rect x="-9" y="17" width="18" height="2.5"/>
      <!-- Central stem -->
      <rect x="-0.7" y="2" width="1.4" height="12"/>
      <!-- Curved branches -->
      <path d="M-0.5 8 C-3 8 -5 6 -5 3 V14" stroke="#1F4FE5" stroke-width="1.2" fill="none"/>
      <path d="M-0.5 8 C-6 8 -9 5 -9 0 V14" stroke="#1F4FE5" stroke-width="1.2" fill="none"/>
      <path d="M-0.5 8 C-9 8 -12 4 -12 -3 V14" stroke="#1F4FE5" stroke-width="1.2" fill="none"/>
      <path d="M0.5 8 C3 8 5 6 5 3 V14" stroke="#1F4FE5" stroke-width="1.2" fill="none"/>
      <path d="M0.5 8 C6 8 9 5 9 0 V14" stroke="#1F4FE5" stroke-width="1.2" fill="none"/>
      <path d="M0.5 8 C9 8 12 4 12 -3 V14" stroke="#1F4FE5" stroke-width="1.2" fill="none"/>
      <!-- 7 candle flames on top -->
      <rect x="-12.7" y="-5" width="1.2" height="3"/>
      <rect x="-9.3" y="-5" width="1.2" height="3"/>
      <rect x="-5.6" y="-5" width="1.2" height="3"/>
      <rect x="-0.6" y="-5" width="1.2" height="3"/>
      <rect x="4.4" y="-5" width="1.2" height="3"/>
      <rect x="8.1" y="-5" width="1.2" height="3"/>
      <rect x="11.5" y="-5" width="1.2" height="3"/>
      <!-- Olive branches at sides -->
      <ellipse cx="-18" cy="6" rx="3.5" ry="7" fill="none" stroke="#1F4FE5" stroke-width="1"/>
      <ellipse cx="18" cy="6" rx="3.5" ry="7" fill="none" stroke="#1F4FE5" stroke-width="1"/>
    </g>
  </g>
</svg>
